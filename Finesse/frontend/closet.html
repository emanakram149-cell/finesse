<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Closet · Laleh</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/finesse.css">
</head><body>
<div class="app-shell">
  <div id="sidebar-slot"></div>
  <main class="app-main">
    <div class="app-top">
      <div><span class="eyebrow">Archive</span><h1>Digital Closet</h1></div>
      <div class="right">
        <button type="button" class="btn-icon" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M12 3a6 6 0 1 0 0 18 6 6 0 0 0 0-18Zm0 0v4M12 21v-4M3 12h4M17 12h4"/></svg>
        </button>
        <button class="btn btn-gold" onclick="openAdd()">+ Add Piece</button>
      </div>
    </div>

    <div class="closet-toolbar">
      <div class="search-bar">
        <span style="opacity:.5">⌕</span>
        <input id="search" placeholder="Search by piece name…">
      </div>
    </div>
    <div class="cat-pills" id="cat-pills"></div>

    <div class="item-grid" id="item-grid"></div>
  </main>
</div>

<div class="modal" id="add-modal">
  <div class="box">
    <h3>Add a piece</h3>
    <form onsubmit="submitAdd(event)" enctype="multipart/form-data">
      <div class="field"><label>Name</label><input name="name" required maxlength="120"></div>
      <div class="field"><label>Category</label>
        <select name="category_id" id="cat-select" required style="width:100%;padding:.9rem 1rem;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text)"></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="field"><label>Color</label><input name="color" placeholder="e.g. ivory"></div>
        <div class="field"><label>Style tag</label><input name="style_tag" placeholder="e.g. evening"></div>
      </div>
      <div class="field"><label>Image</label><input type="file" name="image" accept="image/*" required></div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button type="button" class="btn btn-ghost" onclick="closeAdd()" style="flex:1;justify-content:center">Cancel</button>
        <button class="btn btn-primary" style="flex:1;justify-content:center">Add to Closet</button>
      </div>
    </form>
  </div>
</div>

<div id="floating-slot"></div>
<script src="js/finesse.js"></script>
<script>document.getElementById('sidebar-slot').outerHTML = F.renderChrome('closet');</script>
<script src="js/closet.js"></script>
</body></html>
