<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · Laleh</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/finesse.css">
</head><body>
<div class="app-shell">
  <script>document.write(F_RENDER_PLACEHOLDER='')</script>
  <div id="sidebar-slot"></div>
  <main class="app-main">
    <div class="app-top">
      <div>
        <span class="eyebrow">Atelier</span>
        <h1 id="hello">Welcome</h1>
        <div class="dt-widget" id="dt-widget"></div>
      </div>
      <div class="right">
        <button type="button" class="btn-icon" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M12 3a6 6 0 1 0 0 18 6 6 0 0 0 0-18Zm0 0v4M12 21v-4M3 12h4M17 12h4"/></svg>
        </button>
        <a href="closet.html" class="btn btn-primary">+ Add Piece</a>
      </div>
    </div>

    <section class="widgets">
      <div class="widget"><div class="lbl">Pieces</div><div class="val" id="stat-items">0</div></div>
      <div class="widget gold"><div class="lbl">Looks</div><div class="val" id="stat-outfits">0</div></div>
      <div class="widget"><div class="lbl">Planned</div><div class="val" id="stat-planned">0</div></div>
      <div class="widget dark"><div class="lbl">Style streak</div><div class="val" id="stat-streak">0</div></div>
    </section>

    <div class="dash-grid">
      <div class="card">
        <div class="section-title"><h2>Recent Looks</h2><a href="diva.html" style="color:var(--accent);font-size:.85rem">Open Studio →</a></div>
        <div id="recent-outfits"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="weather-card">
          <div class="city" id="w-city">—</div>
          <div class="t" id="w-temp">—</div>
          <div style="text-transform:capitalize" id="w-cond">loading…</div>
        </div>
        <div class="card">
          <div class="section-title"><h2 style="font-size:1.2rem">AI Picks Today</h2></div>
          <div id="ai-picks" style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="floating-slot"></div>
<script src="js/finesse.js"></script>
<script>document.getElementById('sidebar-slot').outerHTML = F.renderChrome('dashboard');</script>
<script src="js/dashboard.js"></script>
</body></html>
